<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Hush - Welcome into the room</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&amp;family=Plus+Jakarta+Sans:wght@500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-tint": "#8018ea",
                        "background": "#fcf9f8",
                        "outline-variant": "#cec2d8",
                        "tertiary-container": "#886200",
                        "on-primary": "#ffffff",
                        "surface": "#fcf9f8",
                        "inverse-surface": "#313030",
                        "on-primary-container": "#f2e3ff",
                        "primary-fixed": "#eddcff",
                        "tertiary-fixed-dim": "#f3be56",
                        "error": "#ba1a1a",
                        "secondary-container": "#3217ff",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#0c006a",
                        "error-container": "#ffdad6",
                        "on-background": "#1c1b1b",
                        "on-tertiary-fixed-variant": "#5d4200",
                        "primary-fixed-dim": "#d8b9ff",
                        "on-secondary": "#ffffff",
                        "secondary-fixed": "#e2dfff",
                        "surface-bright": "#fcf9f8",
                        "on-primary-fixed-variant": "#6300bb",
                        "on-primary-fixed": "#290055",
                        "on-error": "#ffffff",
                        "secondary": "#2000c7",
                        "surface-container-low": "#f6f3f2",
                        "surface-container-high": "#eae7e7",
                        "surface-container": "#f0eded",
                        "outline": "#7d7387",
                        "on-secondary-container": "#c1c0ff",
                        "surface-variant": "#e5e2e1",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#c2c1ff",
                        "on-tertiary-container": "#ffe6bc",
                        "on-surface-variant": "#4c4355",
                        "surface-container-highest": "#e5e2e1",
                        "primary": "#6f00d2",
                        "on-tertiary-fixed": "#271900",
                        "tertiary-fixed": "#ffdea6",
                        "on-tertiary": "#ffffff",
                        "inverse-on-surface": "#f3f0ef",
                        "primary-container": "#8b2cf5",
                        "on-surface": "#1c1b1b",
                        "tertiary": "#6a4b00",
                        "on-secondary-fixed-variant": "#2700e8",
                        "surface-dim": "#dcd9d9",
                        "inverse-primary": "#d8b9ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "2xl": "1.5rem"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "md": "24px",
                        "sm": "12px",
                        "xs": "4px",
                        "lg": "40px",
                        "container-margin": "20px",
                        "xl": "64px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Plus Jakarta Sans"],
                        "body-lg": ["Be Vietnam Pro"],
                        "label-sm": ["Plus Jakarta Sans"],
                        "body-md": ["Be Vietnam Pro"],
                        "headline-xl": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "label-bold": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "1.2", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "headline-xl": ["40px", { "lineHeight": "1.1", "letterSpacing": "-0.03em", "fontWeight": "800" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "700" }],
                        "label-bold": ["14px", { "lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md">
<!-- Main Content Canvas - Suppressed Navigation due to transactional nature -->
<main class="flex-grow flex flex-col items-center justify-center px-container-margin py-lg w-full max-w-[480px] mx-auto relative z-10">
<!-- Header Section -->
<header class="w-full text-center mb-lg">
<h1 class="font-headline-xl text-headline-xl text-primary mb-md tracking-tighter">Hush</h1>
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-sm">Welcome into the room.</h2>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[320px] mx-auto">
                Save your cues, confidence practices, and Hush recommendations.
            </p>
</header>
<!-- Login Form -->
<form class="w-full bg-surface-container-lowest rounded-2xl shadow-[0_4px_20px_0px_rgba(139,44,245,0.04)] border border-surface-variant p-md flex flex-col gap-md">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-on-surface uppercase" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="w-full bg-surface rounded-xl border border-outline-variant py-sm pl-[40px] pr-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary shadow-inner" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-on-surface uppercase" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline" data-icon="key">key</span>
<input class="w-full bg-surface rounded-xl border border-outline-variant py-sm pl-[40px] pr-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary shadow-inner" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col gap-sm mt-sm">
<button class="w-full bg-gradient-to-r from-primary to-secondary text-on-primary font-label-bold text-label-bold py-sm px-md rounded-xl flex items-center justify-center gap-xs shadow-[0_4px_12px_rgba(111,0,210,0.25)] hover:shadow-[0_6px_16px_rgba(111,0,210,0.35)] transition-all active:scale-[0.98]" type="submit">
<span class="material-symbols-outlined" data-icon="lock" data-weight="fill" style="font-variation-settings: 'FILL' 1;">lock</span>
                    Sign in
                </button>
<button class="w-full bg-transparent border-2 border-[#00ADB5] text-on-surface font-label-bold text-label-bold py-sm px-md rounded-xl hover:bg-surface-variant transition-colors" type="button">
                    Create account
                </button>
</div>
</form>
<!-- Footer / Companion App Link -->
<div class="mt-xl w-full flex flex-col items-center gap-sm">
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Hush companion app</p>
<div class="w-[120px] h-[120px] rounded-2xl overflow-hidden shadow-sm border border-surface-variant">
<img alt="Hush companion app preview" class="w-full h-full object-cover" data-alt="A stylized, modern mobile app interface preview showing a communication dashboard. The design uses a vibrant purple and electric blue palette on a clean white background, reflecting a warm, expert, and encouraging digital environment. Soft ambient lighting highlights the UI elements." src="https://lh3.googleusercontent.com/aida/ADBb0uggzBa6iTu9_Xbo0Fsg9shk7UxZ7acbg9B11wHIJkbBSvS9BYJ20jwom6DZ-pgmCxxEfnvpH-BERbNAH2nUQNLe_7HUTUH_DJyNl2RRCNbdy2xgPH8wlPSLMoMhbd_vrXfsseSNFsZYMd2XvkPxj__29_5lB9J6h48J9NZfRLgo2gWBgRlRMlN2xuYqhNuMu3-9mmmF3rrSd-oVNmlCuQbjXDeGw5zKC25_rd3QXNjNqJsHwWuwzRJWxxqrFXAHiQvtxr9w5YuE8w"/>
</div>
</div>
</main>
<!-- Decorative Background Elements -->
<div class="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
<div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] bg-primary-container/10 blur-[100px] rounded-full"></div>
<div class="absolute bottom-[10%] -right-[20%] w-[60%] h-[60%] bg-secondary-container/5 blur-[120px] rounded-full"></div>
</div>
</body></html>
