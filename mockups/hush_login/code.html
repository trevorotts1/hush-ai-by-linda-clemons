<style type="text/tailwindcss">
        @layer utilities {
            .input-shadow {
                box-shadow: inset 0 2px 4px 0 rgb(0 0 0 / 0.05);
            }
            .card-shadow {
                box-shadow: 0 4px 20px rgba(139, 44, 245, 0.04);
            }
            .gradient-text {
                @apply text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary;
            }
            .btn-primary {
                @apply bg-gradient-to-r from-primary to-secondary text-on-primary rounded-xl font-label-bold text-label-bold py-4 px-6 w-full shadow-[0_8px_16px_rgba(111,0,210,0.2)] hover:shadow-[0_12px_24px_rgba(111,0,210,0.3)] transition-all duration-300;
            }
        }
    </style>

<body class="bg-background text-on-background font-body-md min-h-screen flex items-center justify-center p-4 antialiased">
<!-- Main Container - Mobile First Centered -->
<main class="w-full max-w-[420px] mx-auto bg-surface-container-lowest rounded-[32px] card-shadow overflow-hidden relative flex flex-col min-h-[800px] md:min-h-[700px]">
<!-- Top Image Area -->
<div class="h-64 relative w-full overflow-hidden shrink-0">
<img alt="Hero image" class="absolute inset-0 w-full h-full object-cover" data-alt="A warm, inviting abstract 3D composition representing connection and presence. Soft, rounded organic shapes in gentle violet and teal tones float in a bright, light-mode environment. The lighting is diffused and friendly, casting subtle shadows that emphasize depth and approachability, aligning with a modern, empathetic communication coaching app aesthetic." src="https://lh3.googleusercontent.com/aida/ADBb0uheVxBBWMqBg-hGdcp27la55YNdMcc9d_gAR9u8NXf5uRzP609hlDSVSHWoD31bCYo6KF0TbjamDKJif632mbupDQNYCVIYsS9xUY0MJWlIc65VRKhWLyGf7in99D6LKDt-MgVU8Cj_TvVjm3gUNpOPIjoFlD6xB2hKWvgz-r2h0KrRYxRbaXj7HnZY271ccHe9gjO7PhKit4Eitno136mhc3RPtTogVkeRjW7wgBLNx0n364Vs2nkcTO6hwiMX3yeNinrnSRMhkuw"/>
<div class="absolute inset-0 bg-gradient-to-b from-transparent to-surface-container-lowest"></div>
</div>
<!-- Content Area -->
<div class="flex-1 flex flex-col px-md pb-xl pt-sm relative z-10 -mt-12 bg-surface-container-lowest rounded-t-[32px]">
<!-- Header -->
<div class="text-center mb-xl">
<h1 class="font-headline-xl text-headline-xl gradient-text mb-sm tracking-tighter">Hush</h1>
<h2 class="font-headline-md text-headline-md text-on-surface mb-xs">Welcome into the room</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Your presence is requested.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-md flex-1">
<div class="flex flex-col gap-sm">
<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-on-surface ml-xs" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full bg-surface-container-low border border-surface-variant rounded-xl py-4 pl-12 pr-4 font-body-md text-body-md text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:border-transparent transition-all input-shadow outline-none" id="email" placeholder="hello@example.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center ml-xs">
<label class="font-label-bold text-label-bold text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-secondary transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full bg-surface-container-low border border-surface-variant rounded-xl py-4 pl-12 pr-4 font-body-md text-body-md text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:border-transparent transition-all input-shadow outline-none" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
</div>
<div class="mt-auto pt-lg">
<button class="btn-primary flex items-center justify-center gap-2 group" type="submit">
                        Sign In
                        <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<p class="text-center mt-md font-body-md text-body-md text-on-surface-variant">
                        New here? <a class="text-primary font-label-bold hover:text-secondary transition-colors" href="#">Create an account</a>
</p>
</div>
</form>
</div>
</main>
</body></html>
